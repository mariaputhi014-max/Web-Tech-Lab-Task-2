
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Membership Registration Form</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Library Membership Registration Form</title>
</head>
<body>

<h2>Library Membership Registration Form</h2>

<form>

    <fieldset>
        <legend>Personal Information</legend>

        <label for="fullname">Full Name:</label><br>
        <input type="text" id="fullname" name="fullname"><br><br>

        <label for="memberid">Membership ID:</label><br>
        <input type="text" id="memberid" name="memberid"><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone"><br><br>

        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob"><br><br>

        <label>Gender:</label><br>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label>
    </fieldset>

    <br>

    <fieldset>
        <legend>Membership Information</legend>

        <label for="membership">Membership Type:</label><br>
        <select id="membership" name="membership">
            <option>Student</option>
            <option>Faculty</option>
            <option>Researcher</option>
            <option>General Member</option>
        </select>

        <br><br>

        <label for="section">Preferred Library Section:</label><br>
        <select id="section" name="section">
            <option>Science & Technology</option>
            <option>Literature</option>
            <option>Business Studies</option>
            <option>History</option>
            <option>Arts & Culture</option>
        </select>
    </fieldset>

    <br>

    <fieldset>
        <legend>Reading Preferences</legend>

        <label>Select Favorite Book Categories:</label><br>

        <input type="checkbox" id="fiction" name="category" value="Fiction">
        <label for="fiction">Fiction</label><br>

        <input type="checkbox" id="nonfiction" name="category" value="Non-Fiction">
        <label for="nonfiction">Non-Fiction</label><br>

        <input type="checkbox" id="science" name="category" value="Science">
        <label for="science">Science</label><br>

        <input type="checkbox" id="technology" name="category" value="Technology">
        <label for="technology">Technology</label><br>

        <input type="checkbox" id="biography" name="category" value="Biography">
        <label for="biography">Biography</label><br>

        <input type="checkbox" id="history" name="category" value="History">
        <label for="history">History</label>
    </fieldset>

    <br>

    <fieldset>
        <legend>Library Services</legend>

        <label>Select Services you Want to Use:</label><br>

        <input type="checkbox" id="borrow" name="service" value="Book Borrowing">
        <label for="borrow">Book Borrowing</label><br>

        <input type="checkbox" id="digital" name="service" value="Digital Library Access">
        <label for="digital">Digital Library Access</label><br>

        <input type="checkbox" id="reading" name="service" value="Reading Room">
        <label for="reading">Reading Room</label><br>

        <input type="checkbox" id="research" name="service" value="Research Assistance">
        <label for="research">Research Assistance</label>
    </fieldset>

    <br>

    <fieldset>
        <legend>Additional Information</legend>

        <label for="address">Current Address:</label><br>
        <textarea id="address" name="address" rows="4" cols="40"></textarea>
        <br><br>

        <label for="emergency">Emergency Contact Number:</label><br>
        <input type="tel" id="emergency" name="emergency">
        <br><br>

        <label for="reason">Reason for Joining the Library:</label><br>
        <textarea id="reason" name="reason" rows="4" cols="40"></textarea>
        <br><br>

        <label for="suggestion">Suggestions for Library Improvement:</label><br>
        <textarea id="suggestion" name="suggestion" rows="4" cols="40"></textarea>
    </fieldset>

    <br>

    <button type="submit">Submit</button>
    <button type="reset">Reset</button>

</form>

</body>
</html>
</body>
</html>
